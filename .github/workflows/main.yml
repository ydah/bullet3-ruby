name: Ruby

on:
  push:
    branches:
      - main

  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    name: Ruby ${{ matrix.ruby }} on ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        ruby:
          - '3.1'
          - '3.2'
          - '3.3'

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run fallback specs
        run: BULLET_RUBY_SKIP_NATIVE=1 bundle exec rake spec
      - name: Compile native extension
        run: bundle exec rake compile
      - name: Run native specs
        run: BULLET_RUBY_USE_NATIVE=1 bundle exec rake spec
